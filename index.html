<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyse Badminton Pro - IA Stats</title>
    <style>
        :root {
            --blue: #2563eb;
            --dark: #1e293b;
            --bg: #f1f5f9;
            --court: #166534;
            --stats: #475569;
            --accent: #ffeb3b;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            margin: 0;
            position: relative;
        }

        /* LOGO IA EN HAUT À DROITE */
        .ai-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: white;
            padding: 8px 12px;
            border-radius: 50px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border: 1px solid #e2e8f0;
            font-size: 0.8rem;
            font-weight: bold;
            color: var(--blue);
            z-index: 100;
        }

        /* CONFIGURATION DES POINTS */
        .config-panel {
            background: white;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            border: 2px solid var(--blue);
            margin-top: 50px; /* Espace pour le logo sur mobile */
        }
        .config-group { display: flex; flex-direction: column; align-items: center; font-size: 0.8rem; font-weight: bold; }
        .config-group input { width: 55px; text-align: center; border: 1px solid #ccc; border-radius: 4px; padding: 5px; margin-top: 5px; }

        .scoreboard {
            background: white;
            padding: 1.5rem;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            width: 95%;
            max-width: 950px;
            text-align: center;
        }

        .score-display {
            font-size: 5rem;
            font-weight: 900;
            color: var(--dark);
            margin: 5px 0;
        }

        /* TERRAINS */
        .courts-container {
            display: flex;
            justify-content: space-around;
            gap: 20px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .court-box { display: flex; flex-direction: column; align-items: center; flex: 1; min-width: 320px; }
        .court-label { font-size: 0.95rem; font-weight: bold; margin-bottom: 12px; color: #64748b; text-transform: uppercase; }

        .terrain {
            display: grid;
            grid-template-areas: 
                "ar ar ar"
                "ga ce dr"
                "av av av";
            grid-template-rows: 100px 180px 100px;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 5px;
            background: #cbd5e1;
            border: 6px solid white;
            width: 100%;
            max-width: 380px;
            border-radius: 12px;
            overflow: hidden;
        }

        .zone {
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.1s;
            user-select: none;
            padding: 10px;
            text-align: center;
        }
        .zone:active { opacity: 0.5; transform: scale(0.97); }
        
        .result-data {
            font-size: 1.1rem;
            display: block;
            margin-top: 6px;
            color: var(--accent);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.6);
            line-height: 1.2;
        }
        .count-detail { font-size: 0.75rem; color: white; display: block; opacity: 0.9; }

        .z-score { background-color: var(--court); }
        .z-stats { background-color: var(--stats); }

        .ar { grid-area: ar; }
        .ga { grid-area: ga; }
        .ce { grid-area: ce; }
        .dr { grid-area: dr; }
        .av { grid-area: av; }

        .controls {
            margin-top: 35px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        .btn { border: none; padding: 16px 30px; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.2s; }
        .btn-end { background: var(--blue); color: white; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2); }
        .btn-reset { background: #94a3b8; color: white; }
        .btn:hover { opacity: 0.9; }

        /* Animation pour le logo IA */
        .ai-icon { width: 18px; height: 18px; fill: var(--blue); }
    </style>
</head>
<body>

    <div class="ai-badge">
        <svg class="ai-icon" viewBox="0 0 24 24"><path d="M21 16.5C21 16.88 20.79 17.21 20.47 17.38L12.57 21.82C12.41 21.94 12.21 22 12 22C11.79 22 11.59 21.94 11.43 21.82L3.53 17.38C3.21 17.21 3 16.88 3 16.5V7.5C3 7.12 3.21 6.79 3.53 6.62L11.43 2.18C11.59 2.06 11.79 2 12 2C12.21 2 12.41 2.06 12.57 2.18L20.47 6.62C20.79 6.79 21 7.12 21 7.5V16.5Z"/></svg>
        Assisté par l'IA
    </div>

    <div class="config-panel">
        <div class="config-group">Zone AR <input type="number" id="v_ar" value="100"></div>
        <div class="config-group">Centre G <input type="number" id="v_ga" value="10"></div>
        <div class="config-group">Centre C <input type="number" id="v_ce" value="1"></div>
        <div class="config-group">Centre D <input type="number" id="v_dr" value="10"></div>
        <div class="config-group">Zone AV <input type="number" id="v_av" value="100"></div>
    </div>

    <div class="scoreboard">
        <input type="text" value="JOUEUR 1" style="border:none; font-size:2rem; font-weight:bold; text-align:center; color:var(--blue); width:100%; outline: none; background: transparent;">
        <div class="score-display" id="score">0</div>

        <div class="courts-container">
            <div class="court-box">
                <span class="court-label">Distribution totale des coups</span>
                <div class="terrain">
                    <div class="zone z-stats ar" onclick="reg('ar')">ARRIÈRE <span id="res-ar-s" class="result-data"></span></div>
                    <div class="zone z-stats ga" onclick="reg('ga')">GAUCHE <span id="res-ga-s" class="result-data"></span></div>
                    <div class="zone z-stats ce" onclick="reg('ce')">CENTRE <span id="res-ce-s" class="result-data"></span></div>
                    <div class="zone z-stats dr" onclick="reg('dr')">DROITE <span id="res-dr-s" class="result-data"></span></div>
                    <div class="zone z-stats av" onclick="reg('av')">AVANT <span id="res-av-s" class="result-data"></span></div>
                </div>
            </div>

            <div class="court-box">
                <span class="court-label">Efficacité des Points gagnés</span>
                <div class="terrain">
                    <div class="zone z-score ar" onclick="add('v_ar', 'ar')">ARRIÈRE <span id="res-ar-g" class="result-data"></span></div>
                    <div class="zone z-score ga" onclick="add('v_ga', 'ga')">GAUCHE <span id="res-ga-g" class="result-data"></span></div>
                    <div class="zone z-score ce" onclick="add('v_ce', 'ce')">CENTRE <span id="res-ce-g" class="result-data"></span></div>
                    <div class="zone z-score dr" onclick="add('v_dr', 'dr')">DROITE <span id="res-dr-g" class="result-data"></span></div>
                    <div class="zone z-score av" onclick="add('v_av', 'av')">AVANT <span id="res-av-g" class="result-data"></span></div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-end" onclick="calculBilan()">FIN DU MATCH</button>
            <button class="btn btn-reset" onclick="reset()">RESET</button>
        </div>
    </div>

    <script>
        let totalScore = 0;
        let hits = { ar: 0, ga: 0, ce: 0, dr: 0, av: 0 }; 
        let wins = { ar: 0, ga: 0, ce: 0, dr: 0, av: 0 }; 
        let totalHits = 0;
        let totalWins = 0;

        function reg(zone) {
            hits[zone]++;
            totalHits++;
        }

        function add(configId, zone) {
            const points = parseInt(document.getElementById(configId).value) || 0;
            totalScore += points;
            document.getElementById('score').innerText = totalScore;
            
            wins[zone]++;
            totalWins++;
            
            // Cumul automatique dans les coups joués
            hits[zone]++;
            totalHits++;
        }

        function calculBilan() {
            if (totalHits === 0) return alert("Veuillez enregistrer des coups.");

            for (let z in hits) {
                // Distribution (Terrain Gris)
                let pcHit = ((hits[z] / totalHits) * 100).toFixed(1);
                document.getElementById(`res-${z}-s`).innerHTML = 
                    `${pcHit}% <span class="count-detail">(${hits[z]} / ${totalHits})</span>`;

                // Efficacité (Terrain Vert)
                let pcWin = totalWins > 0 ? ((wins[z] / totalWins) * 100).toFixed(1) : "0";
                document.getElementById(`res-${z}-g`).innerHTML = 
                    `${pcWin}% <span class="count-detail">(${wins[z]} / ${totalWins})</span>`;
            }
        }

        function reset() {
            if(!confirm("Tout réinitialiser ?")) return;
            totalScore = 0; totalHits = 0; totalWins = 0;
            hits = { ar: 0, ga: 0, ce: 0, dr: 0, av: 0 };
            wins = { ar: 0, ga: 0, ce: 0, dr: 0, av: 0 };
            document.getElementById('score').innerText = "0";
            document.querySelectorAll('.result-data').forEach(el => el.innerHTML = "");
        }
    </script>
</body>
</html>
